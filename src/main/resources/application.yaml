spring:
  application:
    name: gaon-climate-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/gaon_climate}
    username: ${SPRING_DATASOURCE_USERNAME:testuser}
    password: ${SPRING_DATASOURCE_PASSWORD:testpwd}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET:dev-jwt-secret-key-must-be-at-least-32-chars-long}
    access-token-expiry-seconds: ${APP_JWT_ACCESS_TOKEN_EXPIRY_SECONDS:86400}
  admin-jwt:
    # 유저용 jwt.secret 과 반드시 다른 값을 사용해야 유저 토큰의 관리자 권한 혼용을 막을 수 있음
    secret: ${APP_ADMIN_JWT_SECRET:dev-admin-jwt-secret-key-must-be-at-least-32-chars-long}
    access-token-expiry-seconds: ${APP_ADMIN_JWT_ACCESS_TOKEN_EXPIRY_SECONDS:3600}
  # 최초 관리자 계정 생성(부트스트랩) 전용 고정 토큰. 관리자 생성 API(X-Admin-Token) 에만 사용
  admin-token: ${APP_ADMIN_TOKEN:dev-admin-token}
  password:
    # 콤마 구분 pepper 키 목록. 롤링 시 끝에 새 키를 추가하고 APP_PASSWORD_PEPPERS 환경변수 갱신
    peppers: ${APP_PASSWORD_PEPPERS:dev-pepper-key-0}
  climate:
    history:
      window-seconds: ${APP_CLIMATE_HISTORY_WINDOW_SECONDS:3600}
      bucket-seconds: ${APP_CLIMATE_HISTORY_BUCKET_SECONDS:600}
