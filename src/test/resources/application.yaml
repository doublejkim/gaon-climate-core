spring:
  datasource:
    url: jdbc:h2:mem:gaon_climate_test;MODE=MariaDB;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  cors:
    allowed-origins: http://localhost:5173
  jwt:
    secret: test-jwt-secret-key-must-be-at-least-32-chars-long
    access-token-expiry-seconds: 86400
  admin-jwt:
    secret: test-admin-jwt-secret-key-must-be-at-least-32-chars-long
    access-token-expiry-seconds: 3600
  admin-token: test-admin-token
  password:
    peppers: test-pepper-key-0

