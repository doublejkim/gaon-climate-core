name: gaon-climate

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPOSITORY_URL: ${REPOSITORY_URL:-https://github.com/doublejkim/gaon-climate-core.git}
        GIT_REF: ${GIT_REF:-main}
    container_name: gaon-climate-core
    restart: unless-stopped
    networks:
      - proxy-net
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      APP_ADMIN_TOKEN: ${APP_ADMIN_TOKEN:?APP_ADMIN_TOKEN is required}
      APP_CLIMATE_HISTORY_WINDOW_SECONDS: ${APP_CLIMATE_HISTORY_WINDOW_SECONDS:-3600}
      APP_CLIMATE_HISTORY_BUCKET_SECONDS: ${APP_CLIMATE_HISTORY_BUCKET_SECONDS:-600}
      LOG_PATH: /logs
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - app_logs:/logs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.climate-api.rule=Host(`api-climate.gaonstack.dev`)"
      - "traefik.http.routers.climate-api.entrypoints=web"
      - "traefik.http.services.climate-api.loadbalancer.server.port=8080"

volumes:
  app_logs:

networks:
  proxy-net:
    external: true
