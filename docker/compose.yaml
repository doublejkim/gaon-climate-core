name: gaon-climate

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REPOSITORY_URL: ${REPOSITORY_URL:-https://github.com/doublejkim/gaon-climate-core.git}
        GIT_REF: ${GIT_REF:-main}
        CACHEBUST: ${CACHEBUST}
    container_name: gaon-climate-core
    restart: unless-stopped
    networks:
      - proxy-net
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?SPRING_DATASOURCE_URL is required}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?SPRING_DATASOURCE_USERNAME is required}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      APP_ADMIN_TOKEN: ${APP_ADMIN_TOKEN:?APP_ADMIN_TOKEN is required}
      # CORS 허용 오리진. 브라우저에서 이 API를 호출하는 "웹 프론트엔드"의 오리진(scheme+host[+port])을 지정한다.
      # - 콤마(,)로 여러 오리션 지정 가능. allowCredentials(true) 라 와일드카드('*')는 사용 불가.
      # - 실제 도메인은 코드/예시에 박지 않고 배포 환경의 .env 에서 주입한다. 미설정 시 컨테이너 기동 실패.
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS is required}
      APP_CLIMATE_HISTORY_WINDOW_SECONDS: ${APP_CLIMATE_HISTORY_WINDOW_SECONDS:-3600}
      APP_CLIMATE_HISTORY_BUCKET_SECONDS: ${APP_CLIMATE_HISTORY_BUCKET_SECONDS:-600}
      LOG_PATH: /logs
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - app_logs:/logs
    # Traefik 라우팅 라벨. 'climate-api' 는 Traefik 내부 라우터/서비스 식별자(임의 이름)일 뿐 도메인이 아니다.
    # 실제 API 도메인은 코드에 박지 않고 .env 의 API_DOMAIN 으로 주입한다(미설정 시 빈 값이 되어 라우팅이 매칭되지 않음).
    # Host() 백틱과 ${API_DOMAIN} 치환을 함께 쓰기 위해 라벨 전체를 큰따옴표로 감싼다.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.climate-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.climate-api.entrypoints=web"
      - "traefik.http.services.climate-api.loadbalancer.server.port=8080"

volumes:
  app_logs:

networks:
  proxy-net:
    external: true
